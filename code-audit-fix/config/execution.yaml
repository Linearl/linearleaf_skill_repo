# code-audit-fix 执行配置（默认：交互式）

mode:
  # 是否启用非交互执行模式：true=无人值守，false=常规交互
  non_interactive: false

  # 无响应/不可交互时的处理策略：
  # - use_default: 使用 defaults 中的默认值继续
  # - abort: 终止当前流程并标记 blocked
  on_no_response: use_default

  # 外层编排等待时长（秒）；ask_questions 本身无 timeout，本字段供编排器使用
  wait_seconds: 90

defaults:
  # 审计范围：full / incremental
  audit_scope: full

  # 交叉复核轮数：1~3
  review_rounds: 2

  # 是否默认启用审计分支
  use_audit_branch: true

quality:
  merge_gate:
    # 是否启用 C1 合并闸门
    enabled: true

    # 性能回归阈值（百分比）
    max_perf_regression_pct: 5

logging:
  decision_log:
    # 是否记录关键决策
    enabled: true

    # 决策日志文件名（在工作区目录下）
    path: decision_log.md

skip:
  debt_backlog:
    # 是否从 skip_log 生成技术债台账
    enabled: true

    # 跳过项建议处理窗口
    sla:
      P1: 24~72h
      P2: 1w
      P3: 1 iteration
      P4: planned

branch:
  # 审计分支命名模板，{date} 形如 2026-03-12
  name_pattern: audit/{date}

interactive:
  # 仅在 mode.non_interactive=false 时有效：是否启用 ask_questions
  questions_enabled: true

commit:
  # 是否强制提交信息模板
  enforce_template: true

  # 提交信息模板
  template: "fix(P{priority}-{id}): {summary}"