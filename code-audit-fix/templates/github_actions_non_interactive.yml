name: code-audit-fix-non-interactive-template

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *' # UTC 17:00 == 北京时间 01:00（示例）

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install validation deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate execution config schema
        run: |
          python .github/skills/code-audit-fix/scripts/validate_execution_config.py \
            --config .github/skills/code-audit-fix/config/execution.yaml \
            --schema .github/skills/code-audit-fix/config/execution.schema.json

      - name: Run non-interactive audit flow
        run: |
          echo "TODO: replace with your real entry command"
          echo "Expected outputs: effective_config.yaml + run_result.json"

      - name: Validate run_result status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('run_result.json')
          if not path.exists():
              raise SystemExit('run_result.json not found')

          data = json.loads(path.read_text(encoding='utf-8'))
          status = data.get('status')
          if status not in ('pass', 'blocked'):
              raise SystemExit(f'invalid status: {status}')
          if status == 'blocked':
              reasons = data.get('blocking_reasons', [])
              print('blocked reasons:', reasons)
              raise SystemExit('code-audit-fix blocked')
          print('code-audit-fix pass')
          PY
